name: CI Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Unit Tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: .
      PIP_DISABLE_PIP_VERSION_CHECK: '1'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            fastapi_app/requirements.txt

      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest pytest-asyncio pytest-timeout pytest-cov pydantic_settings
          pip check

      - name: Run backend tests
        run: pytest tests --cov=fastapi_app --cov-report=term-missing --cov-report=xml

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 7

  frontend-tests:
    name: Frontend Unit Tests (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: fastapi_app/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: fastapi_app/frontend
        run: npm ci --include=dev

      - name: Run frontend tests
        working-directory: fastapi_app/frontend
        run: npm run test
