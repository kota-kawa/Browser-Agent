name: Syntax Check

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: syntax-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-syntax:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python syntax
        run: |
          python - <<'PY'
          import pathlib
          import py_compile
          import subprocess
          import tempfile

          files = [
              pathlib.Path(path)
              for path in subprocess.check_output(['git', 'ls-files', '*.py'], text=True).splitlines()
              if path
          ]

          if not files:
              print('No Python files found.')
              raise SystemExit(0)

          errors = []
          with tempfile.TemporaryDirectory() as tmpdir:
              tmp_path = pathlib.Path(tmpdir)
              for idx, file in enumerate(files):
                  try:
                      py_compile.compile(str(file), cfile=str(tmp_path / f'{idx}.pyc'), doraise=True)
                  except py_compile.PyCompileError as exc:
                      errors.append(str(exc))

          if errors:
              print('\n'.join(errors))
              print(f'Found {len(errors)} Python syntax error(s).')
              raise SystemExit(1)

          print(f'Python syntax OK ({len(files)} files).')
          PY

  backend-runtime-smoke:
    name: Backend Runtime Smoke Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: '1'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            fastapi_app/requirements.txt

      - name: Install backend runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip check

      - name: Import critical backend modules
        run: |
          python - <<'PY'
          import browser_use.agent.service
          import browser_use.browser.session
          import browser_use.llm.google.chat
          import fastapi_app.app
          import fastapi_app.services.agent_controller
          import fastapi_app.services.agent_runtime
          import fastapi_app.webarena.routes

          print('Critical runtime imports OK')
          PY

  frontend-build:
    name: Frontend Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate frontend paths
        run: |
          test -d fastapi_app/frontend
          test -f fastapi_app/frontend/package-lock.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: fastapi_app/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: fastapi_app/frontend
        run: npm ci --include=dev

      - name: Build frontend bundle
        working-directory: fastapi_app/frontend
        run: npm run build
