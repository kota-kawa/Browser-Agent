server {
    listen 80;
    server_name browser-agent.project-kk.com www.browser-agent.project-kk.com;

    # HTTPS にリダイレクト
    return 301 https://browser-agent.project-kk.com$request_uri;
}

server {
    listen 443 ssl;
    server_name www.browser-agent.project-kk.com;

    ssl_certificate     /etc/letsencrypt/live/browser-agent.project-kk.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/browser-agent.project-kk.com/privkey.pem;

    # www → apex にリダイレクト
    return 301 https://browser-agent.project-kk.com$request_uri;
}

server {
    listen 443 ssl;
    server_name browser-agent.project-kk.com;

    ssl_certificate     /etc/letsencrypt/live/browser-agent.project-kk.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/browser-agent.project-kk.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # セキュリティヘッダー
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # アップロード上限（必要に応じて調整）
    client_max_body_size 10M;

    location / {
        proxy_pass         http://127.0.0.1:5007;
        proxy_http_version 1.1;

        # WebSocket サポート（browser-use の場合必要な可能性あり）
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;
    }
}
